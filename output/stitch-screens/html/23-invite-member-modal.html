<div class="fixed inset-0 bg-black/60 backdrop-blur-md z-40 flex items-center justify-center p-md">
<!-- Modal Container -->
<div class="glass-modal rounded-xl w-full max-w-lg border border-white/10 z-50 flex flex-col">
<!-- Modal Header -->
<div class="flex justify-between items-center p-lg border-b border-white/10">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-full overflow-hidden border border-white/10 flex-shrink-0">
<img alt="Workspace Logo" class="w-full h-full object-cover" data-alt="A minimalist logo or icon for a digital workspace, featuring a stark, high-contrast design. The image uses sharp geometric shapes, primarily squares and lines, rendered in bright, luminous white and the signature Emerald green accent against a pure black background. It conveys a sense of precision and modern software tools." src="https://lh3.googleusercontent.com/aida/ADBb0ujOtheoiJFMKBFI8WczO8AaQDJPo1VnivVAIVAzo9TL39g-NHqSzRU2xJntDlm2h10H3nuZ6ZFn4_sxUrNJJO-4WgUA3Y5Iffaj64r6IptZzLUab5g9K1kjmsLxPLYQpdzTfKOlb4HulOmcos6zhsiuX37t_E6r4CwHAKegVQfxDGa6Mdr15uy7BoC7I1_JZTzPj-AevcXnmtkIeMbhEHAt4n_BlLA1Uu0JQKLOTK7mFS48UHXB5Cx1cH0"/>

<div>
<h2 class="font-headline-sm text-headline-sm text-on-surface">Invite New Member</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Saathi Workspace</p>
</div>
</div>
<button class="text-on-surface-variant hover:text-on-surface transition-colors rounded-full p-2 hover:bg-surface-variant/30 flex items-center justify-center">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</div>
<!-- Modal Body -->
<div class="p-lg flex flex-col gap-gutter">
<!-- Email Input -->
<div class="flex flex-col gap-sm">
<label class="font-label-md text-label-md text-on-surface-variant" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">mail</span>
<input class="w-full bg-surface/50 border border-white/10 rounded-lg py-2 pl-10 pr-3 font-body-md text-on-surface focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all placeholder:text-on-surface-variant/50" id="email" placeholder="colleague@example.com" type="email"/>
</div>
</div>
<!-- Role Selection -->
<div class="flex flex-col gap-sm">
<label class="font-label-md text-label-md text-on-surface-variant" for="role">Workspace Role</label>
<div class="relative">
<select class="w-full bg-surface/50 border border-white/10 rounded-lg py-2 pl-3 pr-10 font-body-md text-on-surface appearance-none focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all" id="role">
<option value="member">Member</option>
<option value="admin">Admin</option>
<option value="guest">Guest</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px] pointer-events-none">expand_more</span>
</div>
<p class="font-label-md text-label-md text-on-surface-variant/70 mt-1">Members have full access to workspace projects.</p>
</div>
<!-- Custom Message -->
<div class="flex flex-col gap-sm">
<label class="font-label-md text-label-md text-on-surface-variant" for="message">Custom Message (Optional)</label>
<textarea class="w-full bg-surface/50 border border-white/10 rounded-lg p-3 font-body-md text-on-surface focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all placeholder:text-on-surface-variant/50 resize-none" id="message" placeholder="Welcome to the team! Here's your invite to our Saathi workspace." rows="3"></textarea>
</div>
</div>
<!-- Modal Footer -->
<div class="p-lg border-t border-white/10 flex justify-between items-center bg-surface-container-lowest/50 rounded-b-xl">
<div class="flex items-center gap-2 text-on-surface-variant">

<span class="font-code-sm text-code-sm">+</span>
<kbd class="font-code-sm text-code-sm px-2 py-1 bg-surface rounded border border-white/10 text-on-surface">Enter</kbd>
<span class="font-label-md text-label-md ml-2">to send</span>
</div>
<div class="flex gap-md">
<button class="px-4 py-2 rounded-lg font-label-md text-label-md text-on-surface bg-transparent border border-white/10 hover:bg-surface-variant/50 transition-colors">
                        Cancel
                    </button>
<button class="px-4 py-2 rounded-lg font-label-md text-label-md text-on-primary bg-primary hover:bg-primary-fixed transition-colors flex items-center gap-2">
<span>Send Invite</span>
<span class="material-symbols-outlined text-[16px]">send</span>
</button>
