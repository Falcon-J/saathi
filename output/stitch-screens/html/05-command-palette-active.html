                        "sm": "8px"

                    fontFamily: {
                        "code-sm": ["Inter"],

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined[data-weight="fill"] {
            font-variation-settings: 'FILL' 1;
        }
        
        /* Ambient shadow for the command palette */
        .ambient-shadow {
            box-shadow: 0px 20px 50px rgba(0, 0, 0, 0.5);
        }
        
        /* Faint tonal background on hover for list items */
        .tonal-hover:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen relative overflow-hidden flex justify-center items-center">
<!-- Background Context (Simulated Workspace Dashboard behind overlay) -->
<div class="absolute inset-0 opacity-20 pointer-events-none" data-alt="A dark, out-of-focus background representing a complex workspace dashboard. The scene features abstract data visualizations and interface elements bathed in a sophisticated, low-light aesthetic with subtle emerald green highlights. The overall mood is high-tech, professional, and slightly obscure to serve as a backdrop." style="background-image: url('https://lh3.googleusercontent.com/aida/ADBb0uj3YeIQU3G5vcrGK-Boum56wHlQbtxDlPkEM8MSqwbNocV5bKdHhgs07hy4ep0o4Tahdt7_MaVIlD11og2UjYShI3TUQGq6VpLGpV9_PtenRV9lD63lbekIMaj2d-b98ANj71pUVB1qr3G9fAUjctbuY463mnusWJGW6gT2kcfT9tEcNWTZiFwQDGTA8RVNG7dVqYlVpx3Do63Oxy0T007zvGRQ2HQqQeQJoy4nEboX9m4veVBXHqhxYGwgKOJFP8QGYVj8GJlodpc'); background-size: cover; background-position: center;">
<!-- Placeholder for background content -->
<div class="flex h-full w-full">
<div class="w-64 border-r border-white/10 h-full p-md"></div>
<div class="flex-1 p-margin">
<div class="h-16 border-b border-white/10 w-full mb-lg"></div>
<div class="grid grid-cols-3 gap-lg">
<div class="h-40 border border-white/10 rounded-lg"></div>
<div class="h-40 border border-white/10 rounded-lg"></div>
<div class="h-40 border border-white/10 rounded-lg"></div>
</div>
</div>
</div>
</div>
<!-- Overlay Backdrop -->
<div class="fixed inset-0 bg-background/60 backdrop-blur-[20px] z-40 flex justify-center items-start pt-[10vh] px-md">
<!-- Command Palette Modal -->
<div class="w-full max-w-2xl bg-surface-container-high/90 backdrop-blur-[30px] rounded-xl border border-white/10 ambient-shadow overflow-hidden flex flex-col">
<!-- Input Area -->
<div class="p-lg border-b border-white/10 flex items-center gap-md">
<span class="material-symbols-outlined text-on-surface-variant text-headline-md">search</span>
<input autofocus="" class="w-full bg-transparent border-none text-headline-sm font-headline-sm text-on-surface focus:ring-0 placeholder:text-on-surface-variant/50 p-0" placeholder="Type a command or search..." type="text"/>
<div class="flex items-center gap-xs text-on-surface-variant font-code-sm text-code-sm border border-white/10 rounded px-2 py-1 bg-surface/50">
<span>ESC</span>
</div>
</div>
<!-- Content Area -->
<div class="max-h-[60vh] overflow-y-auto p-sm">
<!-- Suggestions Group -->
<div class="mb-md">
<h3 class="px-md py-sm font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Suggested Actions</h3>
<ul class="flex flex-col gap-xs">
<!-- Action Item 1: Create New Task (Active/Hover State) -->
<li>
<button class="w-full flex items-center justify-between p-md rounded-lg bg-surface-variant border border-primary/20 text-left transition-colors">
<div class="flex items-center gap-md">
<div class="w-8 h-8 rounded-md bg-primary-container/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-[20px]">add_box</span>
</div>
<span class="font-body-lg text-body-lg text-on-surface">Create New Task</span>
</div>
<div class="flex items-center gap-sm">
<span class="text-on-surface-variant font-code-sm text-code-sm">Jump to Project</span>
<div class="flex items-center gap-xs text-on-surface-variant font-code-sm text-code-sm border border-white/10 rounded px-1.5 py-0.5 bg-surface/50">
<span>⌘</span><span>N</span>
</div>
</div>
</button>
</li>
<!-- Action Item 2: Go to Audit Logs -->
<li>
<button class="w-full flex items-center justify-between p-md rounded-lg tonal-hover border border-transparent text-left transition-colors group">
<div class="flex items-center gap-md">
<div class="w-8 h-8 rounded-md bg-surface flex items-center justify-center text-on-surface-variant group-hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-[20px]">history</span>
</div>
<span class="font-body-lg text-body-lg text-on-surface-variant group-hover:text-on-surface transition-colors">Go to Audit Logs</span>
</div>
<div class="flex items-center gap-sm opacity-50 group-hover:opacity-100 transition-opacity">
<span class="text-on-surface-variant font-code-sm text-code-sm">Workspace Settings</span>
<div class="flex items-center gap-xs text-on-surface-variant font-code-sm text-code-sm border border-white/10 rounded px-1.5 py-0.5 bg-surface/50">
<span>G</span><span>A</span>
</div>
</div>
</button>
</li>
<!-- Action Item 3: Manage Permissions -->
<li>
<button class="w-full flex items-center justify-between p-md rounded-lg tonal-hover border border-transparent text-left transition-colors group">
<div class="flex items-center gap-md">
<div class="w-8 h-8 rounded-md bg-surface flex items-center justify-center text-on-surface-variant group-hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-[20px]">admin_panel_settings</span>
</div>
<span class="font-body-lg text-body-lg text-on-surface-variant group-hover:text-on-surface transition-colors">Manage Permissions</span>
</div>
<div class="flex items-center gap-sm opacity-50 group-hover:opacity-100 transition-opacity">
<span class="text-on-surface-variant font-code-sm text-code-sm">Workspace Settings</span>
</div>
</button>
</li>
<!-- Action Item 4: Switch Workspace -->
<li>
<button class="w-full flex items-center justify-between p-md rounded-lg tonal-hover border border-transparent text-left transition-colors group">
<div class="flex items-center gap-md">
<div class="w-8 h-8 rounded-md bg-surface flex items-center justify-center text-on-surface-variant group-hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-[20px]">swap_horiz</span>
</div>
<span class="font-body-lg text-body-lg text-on-surface-variant group-hover:text-on-surface transition-colors">Switch Workspace</span>
</div>
<div class="flex items-center gap-sm opacity-50 group-hover:opacity-100 transition-opacity">
<div class="flex items-center gap-xs text-on-surface-variant font-code-sm text-code-sm border border-white/10 rounded px-1.5 py-0.5 bg-surface/50">
<span>⌘</span><span>K</span>
</div>
</div>
</button>
</li>
</ul>
</div>
</div>
<!-- Footer / Hints -->
<div class="border-t border-white/10 p-sm px-md flex items-center justify-between bg-surface/50">
<div class="flex items-center gap-md text-on-surface-variant font-code-sm text-code-sm">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-[16px]">keyboard_return</span>
<span>to select</span>
</div>
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-[16px]">arrow_upward</span>
<span class="material-symbols-outlined text-[16px]">arrow_downward</span>
<span>to navigate</span>
</div>
</div>
<div class="flex items-center gap-sm">
<img alt="Small avatar" class="w-6 h-6 rounded-full border border-white/20" data-alt="A small, stylized digital avatar of a professional user. The avatar is rendered in a minimalist, high-tech style with subtle dark green and dark gray tones, matching the sleek aesthetic of the interface. It conveys a sense of quiet authority and focus." src="https://lh3.googleusercontent.com/aida/ADBb0ujOtheoiJFMKBFI8WczO8AaQDJPo1VnivVAIVAzo9TL39g-NHqSzRU2xJntDlm2h10H3nuZ6ZFn4_sxUrNJJO-4WgUA3Y5Iffaj64r6IptZzLUab5g9K1kjmsLxPLYQpdzTfKOlb4HulOmcos6zhsiuX37t_E6r4CwHAKegVQfxDGa6Mdr15uy7BoC7I1_JZTzPj-AevcXnmtkIeMbhEHAt4n_BlLA1Uu0JQKLOTK7mFS48UHXB5Cx1cH0"/>
<span class="font-label-md text-label-md text-on-surface-variant">Saathi Precision</span>
</div>
</div>
</div>
</div>
</body></html>
