<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                    "borderRadius": {

<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 20px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
        
        /* Glassmorphism utility */
        .glass-panel {
            background: rgba(41, 41, 49, 0.7); /* surface-container-high with opacity */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        /* Modal Backdrop */
        .modal-backdrop {
            background: rgba(18, 19, 26, 0.8); /* surface with opacity */
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen font-body-md antialiased overflow-hidden selection:bg-primary/30 selection:text-primary">
<!-- Background Context (Dashboard Mockup) -->
<div class="fixed inset-0 z-0 opacity-40 pointer-events-none flex">
<!-- Mock Sidebar -->
<div class="w-64 h-full border-r border-white/5 p-md flex flex-col gap-md">
<div class="h-8 w-32 bg-surface-variant rounded"></div>
<div class="h-4 w-full bg-surface-variant/50 rounded mt-lg"></div>
<div class="h-4 w-3/4 bg-surface-variant/50 rounded"></div>
<div class="h-4 w-5/6 bg-surface-variant/50 rounded"></div>
</div>
<!-- Mock Content -->
<div class="flex-1 p-margin flex flex-col gap-lg">
<div class="h-12 w-full bg-surface-variant/30 rounded-lg border border-white/5"></div>
<div class="grid grid-cols-3 gap-md">
<div class="h-32 bg-surface-variant/20 rounded-lg border border-white/5"></div>
<div class="h-32 bg-surface-variant/20 rounded-lg border border-white/5"></div>
<div class="h-32 bg-surface-variant/20 rounded-lg border border-white/5"></div>
</div>
<div class="flex-1 bg-surface-variant/10 rounded-lg border border-white/5"></div>
</div>
</div>
<!-- Modal Overlay Container -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-md modal-backdrop">
<!-- Create Task Modal -->
<div class="glass-panel w-full max-w-[600px] rounded-xl shadow-[0_20px_50px_rgba(0,0,0,0.5)] flex flex-col max-h-[90vh]">
<!-- Modal Header -->
<div class="flex justify-between items-center px-lg py-md border-b border-white/5">
<div class="flex items-center gap-sm text-on-surface">
<span class="material-symbols-outlined" data-icon="add_task">add_task</span>
<h2 class="font-headline-sm text-headline-sm">Create Task</h2>
</div>
<button aria-label="Close" class="text-on-surface-variant hover:text-on-surface transition-colors p-1 rounded hover:bg-surface-variant/50">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<!-- Modal Body (Scrollable) -->
<div class="flex-1 overflow-y-auto p-lg space-y-lg custom-scrollbar">
<!-- Task Title -->
<div class="space-y-sm">
<input autofocus="" class="w-full bg-transparent border-none text-headline-md font-headline-md text-on-surface placeholder-on-surface-variant/50 focus:ring-0 p-0" placeholder="Task Title" type="text"/>
</div>
<!-- Command/Details Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<!-- Workspace Selection -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Workspace</label>
<div class="relative group">
<select class="w-full appearance-none bg-surface-container border border-outline-variant rounded-lg px-md py-sm text-on-surface focus:border-primary focus:ring-1 focus:ring-primary transition-colors cursor-pointer pr-10">
<option>Saathi Workspace</option>
<option>Engineering</option>
<option>Design</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none group-hover:text-on-surface transition-colors">expand_more</span>
</div>
</div>
<!-- Project Selection -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Project</label>
<div class="relative group">
<select class="w-full appearance-none bg-surface-container border border-outline-variant rounded-lg px-md py-sm text-on-surface focus:border-primary focus:ring-1 focus:ring-primary transition-colors cursor-pointer pr-10">
<option>Q4 Marketing Campaign</option>
<option>Website Redesign</option>
<option>Backend Optimization</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none group-hover:text-on-surface transition-colors">expand_more</span>
</div>
</div>
</div>
<!-- Description -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider flex items-center gap-2">
<span class="material-symbols-outlined text-[16px]">description</span> Description
                    </label>
<textarea class="w-full bg-surface-container border border-outline-variant rounded-lg px-md py-sm text-on-surface placeholder-on-surface-variant/50 focus:border-primary focus:ring-1 focus:ring-primary transition-colors resize-y font-body-md text-body-md" placeholder="Add more details to this task..." rows="4"></textarea>
</div>
<!-- Attributes Row -->
<div class="flex flex-wrap gap-md items-center pt-sm">
<!-- Assignee -->
<button class="flex items-center gap-2 px-3 py-1.5 rounded-full border border-outline-variant hover:border-primary hover:bg-surface-variant/30 transition-all group">
<img alt="Assignee Avatar" class="w-5 h-5 rounded-full object-cover border border-white/10" data-alt="A small, stylized circular avatar placeholder image. The design is minimalist, utilizing a flat emerald green color palette. The avatar implies a professional user profile picture within a dark mode UI environment." src="https://lh3.googleusercontent.com/aida/ADBb0ujOtheoiJFMKBFI8WczO8AaQDJPo1VnivVAIVAzo9TL39g-NHqSzRU2xJntDlm2h10H3nuZ6ZFn4_sxUrNJJO-4WgUA3Y5Iffaj64r6IptZzLUab5g9K1kjmsLxPLYQpdzTfKOlb4HulOmcos6zhsiuX37t_E6r4CwHAKegVQfxDGa6Mdr15uy7BoC7I1_JZTzPj-AevcXnmtkIeMbhEHAt4n_BlLA1Uu0JQKLOTK7mFS48UHXB5Cx1cH0"/>
<span class="font-label-md text-label-md text-on-surface group-hover:text-primary transition-colors">Assign</span>
</button>
<!-- Priority -->
<div class="relative inline-block">
<button class="flex items-center gap-2 px-3 py-1.5 rounded-full border border-outline-variant hover:border-outline transition-all group bg-surface-container">
<span class="material-symbols-outlined text-[16px] text-tertiary">flag</span>
<span class="font-label-md text-label-md text-on-surface">High Priority</span>
<span class="material-symbols-outlined text-[16px] text-on-surface-variant">arrow_drop_down</span>
</button>
</div>
<!-- Due Date -->
<button class="flex items-center gap-2 px-3 py-1.5 rounded-full border border-outline-variant hover:border-outline transition-all group border-dashed">
<span class="material-symbols-outlined text-[16px] text-on-surface-variant group-hover:text-on-surface">calendar_today</span>
<span class="font-label-md text-label-md text-on-surface-variant group-hover:text-on-surface">Set Due Date</span>
</button>
</div>
</div>
<!-- Modal Footer -->
<div class="px-lg py-md border-t border-white/5 flex justify-between items-center bg-surface-container-highest/50 rounded-b-xl">
<!-- Hint/Shortcut -->
<div class="hidden sm:flex items-center gap-2 text-on-surface-variant opacity-70">
<span class="font-code-sm text-code-sm px-2 py-0.5 rounded bg-surface border border-outline-variant text-[10px]">CMD</span>
<span class="font-code-sm text-code-sm px-2 py-0.5 rounded bg-surface border border-outline-variant text-[10px]">ENTER</span>
<span class="font-label-md text-label-md text-[11px]">to create</span>
</div>
<!-- Actions -->
<div class="flex gap-sm w-full sm:w-auto justify-end">
<button class="px-4 py-2 rounded-lg font-label-md text-label-md text-on-surface-variant hover:text-on-surface hover:bg-surface-variant/50 border border-transparent transition-all">
                        Cancel
                    </button>
<button class="px-6 py-2 rounded-lg font-label-md text-label-md bg-primary text-on-primary-fixed hover:bg-primary-fixed transition-colors shadow-[0_0_15px_rgba(78,222,163,0.2)] flex items-center gap-2">
<span>Create Task</span>
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1;">send</span>
</button>
</div>
</div>
</div>
</div>
</body></html>
