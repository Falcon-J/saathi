<a class="flex items-center gap-md px-md py-sm bg-primary-container text-on-primary-container rounded-lg font-label-md text-label-md" href="#">

<a class="flex items-center gap-md px-md py-sm text-on-surface-variant hover:bg-surface-variant/50 rounded-lg font-label-md text-label-md hover:bg-surface-variant/50 transition-all" href="#">

<div class="flex items-center gap-md w-1/3">
<div class="relative w-full max-w-md hidden">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant">search</span>
<input class="w-full bg-surface-container-high border border-white/10 rounded-lg py-sm pl-xl pr-sm text-body-md font-body-md text-on-surface placeholder:text-on-surface-variant focus:outline-none focus:ring-2 focus:ring-primary/50 transition-all" placeholder="Search or type a command..." type="text"/>
<span class="absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant font-code-sm text-code-sm border border-white/10 px-1 rounded bg-surface-container">⌘K</span>
</div>
</div>

<button class="text-on-surface-variant hover:bg-surface-variant/30 rounded-full p-2 transition-colors">
<span class="material-symbols-outlined">notifications</span>
</button>
<button class="text-on-surface-variant hover:bg-surface-variant/30 rounded-full p-2 transition-colors">
<span class="material-symbols-outlined">account_circle</span>
</button>
<button class="bg-primary hover:bg-primary-fixed text-on-primary px-lg py-sm rounded-lg font-label-md text-label-md transition-colors ml-sm">

<div class="max-w-2xl w-full flex flex-col items-center justify-center text-center space-y-xl z-10">

<p class="font-body-lg text-body-lg text-on-surface-variant">You have no pending tasks in this workspace. Rest easy, or start planning your next move to maintain momentum.</p>
</div>
<!-- Primary Action -->
<div class="pt-sm flex flex-col sm:flex-row gap-md items-center justify-center w-full">
<button class="bg-primary hover:bg-primary-fixed text-on-primary px-xl py-sm rounded-lg font-label-md text-label-md transition-all shadow-[0_0_20px_rgba(16,185,129,0.2)] hover:shadow-[0_0_30px_rgba(16,185,129,0.4)] flex items-center gap-sm w-full sm:w-auto justify-center">
