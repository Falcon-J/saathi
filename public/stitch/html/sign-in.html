<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign In - Saathi</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-error-container": "#ffdad6",
                        "on-surface": "#e3e1ec",
                        "on-primary-fixed": "#002113",
                        "tertiary-container": "#fc7c78",
                        "background": "#12131a",
                        "on-secondary": "#313032",
                        "tertiary-fixed-dim": "#ffb3af",
                        "surface-container-highest": "#33343c",
                        "tertiary-fixed": "#ffdad7",
                        "surface-bright": "#383941",
                        "error-container": "#93000a",
                        "on-tertiary-fixed-variant": "#842225",
                        "surface-dim": "#12131a",
                        "on-primary-container": "#00422b",
                        "on-tertiary-container": "#711419",
                        "on-secondary-container": "#b7b4b7",
                        "surface": "#12131a",
                        "inverse-primary": "#006c49",
                        "surface-container-lowest": "#0d0e15",
                        "on-secondary-fixed": "#1c1b1d",
                        "tertiary": "#ffb3af",
                        "inverse-on-surface": "#2f3038",
                        "surface-variant": "#33343c",
                        "on-primary": "#003824",
                        "primary-fixed": "#6ffbbe",
                        "on-tertiary": "#650911",
                        "on-tertiary-fixed": "#410005",
                        "surface-container": "#1e1f26",
                        "on-secondary-fixed-variant": "#474649",
                        "primary-container": "#10b981",
                        "on-error": "#690005",
                        "secondary-fixed-dim": "#c8c6c8",
                        "inverse-surface": "#e3e1ec",
                        "secondary": "#c8c6c8",
                        "error": "#ffb4ab",
                        "on-surface-variant": "#bbcabf",
                        "outline": "#86948a",
                        "surface-tint": "#4edea3",
                        "outline-variant": "#3c4a42",
                        "primary-fixed-dim": "#4edea3",
                        "secondary-fixed": "#e5e1e4",
                        "on-background": "#e3e1ec",
                        "secondary-container": "#474649",
                        "surface-container-low": "#1a1b22",
                        "primary": "#4edea3",
                        "on-primary-fixed-variant": "#005236",
                        "surface-container-high": "#292931"
                    },
                    borderRadius: {
                        DEFAULT: "0.25rem",
                        lg: "0.5rem",
                        xl: "0.75rem",
                        full: "9999px"
                    },
                    spacing: {
                        md: "16px",
                        margin: "32px",
                        xl: "40px",
                        lg: "24px",
                        sm: "8px",
                        xs: "4px",
                        unit: "4px",
                        gutter: "24px"
                    },
                    fontFamily: {
                        "code-sm": ["Inter", "monospace"],
                        "label-md": ["Inter", "sans-serif"],
                        "headline-md": ["Inter", "sans-serif"],
                        "body-lg": ["Inter", "sans-serif"],
                        "display-lg": ["Inter", "sans-serif"],
                        "headline-sm": ["Inter", "sans-serif"],
                        "body-md": ["Inter", "sans-serif"]
                    },
                    fontSize: {
                        "code-sm": ["13px", { lineHeight: "1.4", letterSpacing: "0em", fontWeight: "400" }],
                        "label-md": ["12px", { lineHeight: "1.2", letterSpacing: "0.02em", fontWeight: "500" }],
                        "headline-md": ["24px", { lineHeight: "1.3", letterSpacing: "-0.02em", fontWeight: "600" }],
                        "body-lg": ["16px", { lineHeight: "1.6", letterSpacing: "0em", fontWeight: "400" }],
                        "display-lg": ["48px", { lineHeight: "1.1", letterSpacing: "-0.04em", fontWeight: "700" }],
                        "headline-sm": ["18px", { lineHeight: "1.4", letterSpacing: "-0.01em", fontWeight: "600" }],
                        "body-md": ["14px", { lineHeight: "1.5", letterSpacing: "0em", fontWeight: "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center relative overflow-hidden font-body-md text-body-md antialiased">
<!-- Ambient Background Glow -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
<!-- Main Authentication Card -->
<main class="relative z-10 w-full max-w-md mx-margin p-margin bg-surface-container/80 backdrop-blur-xl border border-white/10 rounded-xl shadow-[0_20px_50px_rgba(0,0,0,0.3)] flex flex-col gap-lg">
<!-- Header & Branding -->
<header class="flex flex-col items-center text-center">
<!-- Real-time Sync Indicator -->
<div class="inline-flex items-center gap-xs px-2 py-1 rounded-full bg-surface-variant/50 border border-white/5 text-on-surface-variant font-code-sm text-code-sm mb-md">
<span aria-hidden="true" class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"></span>
<span>Real-time sync active</span>
</div>
<!-- Logo Area -->
<div class="flex items-center justify-center w-12 h-12 rounded-lg bg-surface-container-highest border border-white/5 mb-md shadow-sm">
<span class="material-symbols-outlined text-primary text-[28px]" data-icon="polyline">polyline</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface mb-xs">Welcome back to Saathi</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to your high-performance workspace.</p>
</header>
<!-- Authentication Form -->
<form class="flex flex-col gap-md w-full">
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="email">Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors text-[20px] pointer-events-none" data-icon="mail">mail</span>
<input class="w-full bg-surface-container-highest border border-outline-variant/50 rounded-lg py-2.5 pl-10 pr-3 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/40 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" id="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:text-primary-fixed-dim transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors text-[20px] pointer-events-none" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-highest border border-outline-variant/50 rounded-lg py-2.5 pl-10 pr-10 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/40 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" id="password" placeholder="••••••••" required="" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Submit Action -->
<button class="mt-sm w-full bg-primary text-on-primary-container font-label-md text-label-md py-3 rounded-lg hover:bg-primary-fixed transition-colors flex items-center justify-center gap-sm" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative flex items-center py-sm">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="flex-shrink-0 px-4 font-code-sm text-code-sm text-on-surface-variant/70 uppercase tracking-wider">or continue with</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<!-- OAuth Options -->
<div class="flex gap-md w-full">
<button class="flex-1 flex items-center justify-center gap-sm py-2.5 px-4 bg-transparent border border-outline-variant/50 rounded-lg hover:bg-surface-variant/50 hover:border-outline-variant transition-all font-label-md text-label-md text-on-surface" type="button">
<span class="font-code-sm text-code-sm">Google</span>
</button>
<button class="flex-1 flex items-center justify-center gap-sm py-2.5 px-4 bg-transparent border border-outline-variant/50 rounded-lg hover:bg-surface-variant/50 hover:border-outline-variant transition-all font-label-md text-label-md text-on-surface" type="button">
<span class="font-code-sm text-code-sm">GitHub</span>
</button>
</div>
<!-- Footer Links -->
<div class="text-center pt-xs">
<p class="font-body-md text-body-md text-on-surface-variant">
                Don't have an account? 
                <a class="text-primary hover:text-primary-fixed-dim transition-colors font-label-md text-label-md ml-1" href="#">Create account</a>
</p>
</div>
</main>
</body></html>
